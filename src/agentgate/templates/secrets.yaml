apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ea_agentgate.fullname" . }}-secrets
  labels:
    {{- include "ea_agentgate.labels" . | nindent 4 }}
type: Opaque
stringData:
  database-url: {{ include "ea_agentgate.databaseUrl" . | quote }}
  redis-url: {{ include "ea_agentgate.redisUrl" . | quote }}
  secret-key: {{ .Values.server.secrets.secretKey | default (randAlphaNum 64) | quote }}
  nextauth-secret: {{ .Values.server.secrets.nextauthSecret | default (randAlphaNum 64) | quote }}
  hmac-secret: {{ .Values.server.secrets.hmacSecret | default (randAlphaNum 64) | quote }}
  decision-signing-key: {{ .Values.server.secrets.decisionSigningKey | default (randAlphaNum 44) | quote }}
  honey-salt: {{ .Values.server.secrets.honeySalt | default (randAlphaNum 32) | quote }}
