apiVersion: v1
kind: Service
metadata:
  name: {{ include "agentgate.fullname" . }}-server
  labels:
    {{- include "agentgate.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
  {{- with .Values.server.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.server.service.type }}
  ports:
    - port: {{ .Values.server.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: 9090
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "agentgate.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: server
---
{{- if .Values.dashboard.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agentgate.fullname" . }}-dashboard
  labels:
    {{- include "agentgate.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  type: {{ .Values.dashboard.service.type }}
  ports:
    - port: {{ .Values.dashboard.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "agentgate.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
{{- end }}
